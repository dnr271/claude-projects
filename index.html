<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarkov Loot Route Planner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #c8b87a;
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
    cursor: crosshair;
  }

  header {
    background: linear-gradient(180deg, #1a1a14 0%, #0f0f0a 100%);
    border-bottom: 2px solid #3a3520;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-shrink: 0;
    z-index: 10;
  }

  header h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 22px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #c8b87a;
    text-shadow: 0 0 10px rgba(200, 184, 122, 0.3);
  }

  header h1 span { color: #8a9a3a; }

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
  }

  label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #6a6245;
  }

  select {
    background: #1a1a14;
    color: #c8b87a;
    border: 1px solid #3a3520;
    padding: 8px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }

  select:hover { border-color: #8a9a3a; }

  button {
    background: #2a1a1a;
    color: #c84a3a;
    border: 1px solid #5a2a20;
    padding: 8px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }

  button:hover {
    background: #3a1a1a;
    border-color: #c84a3a;
    text-shadow: 0 0 8px rgba(200, 74, 58, 0.5);
  }

  button.btn-edit {
    background: #1a1a2a;
    color: #5a8ac8;
    border-color: #203a5a;
  }

  button.btn-edit:hover {
    background: #1a1a3a;
    border-color: #5a8ac8;
    text-shadow: 0 0 8px rgba(90, 138, 200, 0.5);
  }

  button.btn-edit.active {
    background: #0a2a4a;
    color: #6ac8e8;
    border-color: #6ac8e8;
    box-shadow: 0 0 8px rgba(106, 200, 232, 0.3);
  }

  button.btn-save {
    background: #1a2a1a;
    color: #5ac85a;
    border-color: #205a20;
  }

  button.btn-save:hover {
    background: #1a3a1a;
    border-color: #5ac85a;
    text-shadow: 0 0 8px rgba(90, 200, 90, 0.5);
  }

  button.btn-reset {
    background: #2a2a1a;
    color: #c8a03a;
    border-color: #5a4a20;
  }

  button.btn-reset:hover {
    background: #3a3a1a;
    border-color: #c8a03a;
    text-shadow: 0 0 8px rgba(200, 160, 58, 0.5);
  }

  .edit-controls { display: none; gap: 10px; }
  .edit-controls.active { display: flex; }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* ── Map Area ── */
  .map-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 16px;
    min-width: 0;
    min-height: 0;
    background: radial-gradient(ellipse at center, #141410 0%, #0a0a08 100%);
  }

  .map-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 39px, #1a1a1422 40px
    ), repeating-linear-gradient(
      90deg, transparent, transparent 39px, #1a1a1422 40px
    );
    pointer-events: none;
  }

  /* ── Map Container ── */
  .map-container {
    position: relative;
    max-width: 100%;
    max-height: 100%;
    aspect-ratio: 16 / 9;
    /* Use height as the constraint since vertical space is limited */
    height: 100%;
    border: 1px solid #2a2518;
    box-shadow:
      0 0 60px rgba(138, 154, 58, 0.04),
      inset 0 0 80px rgba(0,0,0,0.5);
    background-color: #0e0e0a;
  }

  .map-bg {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    position: absolute;
    inset: 0;
    z-index: 0;
    opacity: 0.85;
  }

  .map-container.no-image {
    background:
      radial-gradient(ellipse at 30% 40%, #1a1e12 0%, transparent 50%),
      radial-gradient(ellipse at 70% 60%, #14180e 0%, transparent 50%),
      #0e0e0a;
  }

  .map-container.no-image::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 27px, #1a1a1418 28px),
      repeating-linear-gradient(90deg, transparent, transparent 27px, #1a1a1418 28px);
    pointer-events: none;
    z-index: 0;
  }

  .map-container::after {
    content: attr(data-map-name);
    position: absolute;
    top: 10px;
    left: 14px;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: rgba(200, 184, 122, 0.25);
    pointer-events: none;
    z-index: 5;
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
  }

  /* Edit mode indicator */
  .map-container.edit-mode {
    border-color: #5a8ac8;
    box-shadow: 0 0 20px rgba(90, 138, 200, 0.15), inset 0 0 80px rgba(0,0,0,0.5);
  }

  .map-container.edit-mode::after {
    content: '// EDIT MODE — DRAG NODES';
    color: #6ac8e8;
  }

  .compass {
    position: absolute;
    bottom: 12px;
    right: 14px;
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    color: rgba(200, 184, 122, 0.2);
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 5;
  }

  /* ── SVG route lines ── */
  svg.route-lines {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 3;
  }

  @keyframes dashFlow {
    to { stroke-dashoffset: -20; }
  }

  svg.route-lines line {
    stroke: #8a9a3a;
    stroke-width: 2.5;
    stroke-dasharray: 8 6;
    opacity: 0.8;
    animation: dashFlow 0.8s linear infinite;
    filter: drop-shadow(0 0 4px rgba(138,154,58,0.5));
  }

  svg.route-lines .arrow-head {
    fill: #8a9a3a;
    opacity: 0.9;
  }

  /* ── Zone Nodes ── */
  .zone {
    position: absolute;
    transform: translate(-50%, -50%);
    z-index: 4;
    cursor: pointer;
    transition: left 0.05s, top 0.05s;
  }

  .zone.dragging {
    z-index: 10;
    transition: none;
    cursor: grabbing;
  }

  .zone-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #6a6245, #3a3520);
    border: 2px solid #4a4530;
    box-shadow: 0 0 8px rgba(106, 98, 69, 0.4), 0 0 2px rgba(0,0,0,0.8);
    margin: 0 auto;
    transition: all 0.2s;
    position: relative;
  }

  .zone-dot::before {
    content: '';
    position: absolute;
    top: 50%;
    left: -5px;
    right: -5px;
    height: 1px;
    background: currentColor;
    opacity: 0.3;
    pointer-events: none;
  }

  @keyframes ping {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(2.8); opacity: 0; }
  }

  .zone-dot::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 1px solid #6a6245;
    opacity: 0;
    pointer-events: none;
  }

  .zone:hover .zone-dot::after {
    animation: ping 1s ease-out infinite;
    opacity: 1;
  }

  .zone-label {
    margin-top: 4px;
    font-size: 9px;
    color: #8a8060;
    text-align: center;
    white-space: nowrap;
    text-shadow: 0 1px 4px #000, 0 0 8px #000;
    letter-spacing: 0.5px;
    pointer-events: none;
  }

  .zone:hover .zone-dot {
    transform: scale(1.5);
    box-shadow: 0 0 16px rgba(138, 154, 58, 0.6), 0 0 2px rgba(0,0,0,0.8);
    border-color: #8a9a3a;
    background: radial-gradient(circle at 40% 35%, #b8c86a, #8a9a3a);
  }

  .zone:hover .zone-label { color: #c8b87a; }

  .zone[data-danger="High"] .zone-dot { border-color: #c84a3a; box-shadow: 0 0 8px rgba(200,74,58,0.4), 0 0 2px rgba(0,0,0,0.8); }
  .zone[data-danger="Medium"] .zone-dot { border-color: #c8a03a; box-shadow: 0 0 8px rgba(200,160,58,0.3), 0 0 2px rgba(0,0,0,0.8); }
  .zone[data-danger="Low"] .zone-dot { border-color: #4a8a3a; box-shadow: 0 0 8px rgba(74,138,58,0.3), 0 0 2px rgba(0,0,0,0.8); }

  .zone.in-route .zone-dot {
    background: radial-gradient(circle at 40% 35%, #c8e06a, #8a9a3a);
    border-color: #aaca4a !important;
    box-shadow: 0 0 14px rgba(138, 154, 58, 0.6), 0 0 2px rgba(0,0,0,0.8) !important;
    transform: scale(1.3);
  }

  .zone.in-route .zone-label { color: #c8b87a; }

  /* Edit mode: blue glow on nodes */
  .edit-mode .zone .zone-dot {
    cursor: grab;
    border-color: #5a8ac8 !important;
    box-shadow: 0 0 10px rgba(90, 138, 200, 0.4), 0 0 2px rgba(0,0,0,0.8) !important;
  }

  .edit-mode .zone:hover .zone-dot {
    border-color: #6ac8e8 !important;
    box-shadow: 0 0 16px rgba(106, 200, 232, 0.5), 0 0 2px rgba(0,0,0,0.8) !important;
  }

  .zone .route-number {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    background: #8a9a3a;
    color: #0a0a0a;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: bold;
    font-family: 'Oswald', sans-serif;
    box-shadow: 0 0 6px rgba(138, 154, 58, 0.6);
    z-index: 5;
  }

  /* ── Tooltip HUD ── */
  .tooltip-hud {
    display: none;
    position: absolute;
    z-index: 100;
    background: #12120eee;
    border: 1px solid #3a3520;
    padding: 10px 14px;
    min-width: 180px;
    pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.7);
  }

  .tooltip-hud::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
  }

  .tooltip-hud[data-danger="High"]::before { background: #c84a3a; }
  .tooltip-hud[data-danger="Medium"]::before { background: #c8a03a; }
  .tooltip-hud[data-danger="Low"]::before { background: #4a8a3a; }

  .tooltip-hud .tt-name {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #c8b87a;
    margin-bottom: 8px;
    border-bottom: 1px solid #2a2518;
    padding-bottom: 6px;
  }

  .tooltip-hud .tt-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 4px;
  }

  .tooltip-hud .tt-label { color: #6a6245; }
  .tooltip-hud .tt-value { color: #c8b87a; font-weight: bold; }

  .tt-value.danger-high { color: #c84a3a; }
  .tt-value.danger-medium { color: #c8a03a; }
  .tt-value.danger-low { color: #4a8a3a; }
  .tt-value.loot-s { color: #e8c84a; }
  .tt-value.loot-a { color: #c8b87a; }
  .tt-value.loot-b { color: #8a8a6a; }
  .tt-value.loot-c { color: #5a5a4a; }

  .tooltip-hud .tt-keys {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid #2a2518;
    font-size: 10px;
    color: #8a7a4a;
  }

  .tooltip-hud .tt-keys span {
    display: inline-block;
    background: #1a1a14;
    border: 1px solid #3a3520;
    padding: 2px 6px;
    margin: 2px 2px 0 0;
    font-size: 9px;
    color: #c8a03a;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 300px;
    background: linear-gradient(180deg, #121210 0%, #0e0e0a 100%);
    border-left: 2px solid #3a3520;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    z-index: 10;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid #2a2518;
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #8a9a3a;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar-header .count {
    background: #8a9a3a;
    color: #0a0a0a;
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 12px;
  }

  .route-stats {
    padding: 12px 16px;
    border-bottom: 1px solid #2a2518;
    display: none;
  }

  .route-stats.active { display: block; }

  .route-stats .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 5px;
  }

  .route-stats .stat-label { color: #6a6245; }
  .route-stats .stat-value { font-weight: bold; }

  .route-stats .keys-needed {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #1a1a14;
  }

  .route-stats .keys-needed .stat-label {
    display: block;
    margin-bottom: 4px;
  }

  .route-stats .key-tag {
    display: inline-block;
    background: #1a1a14;
    border: 1px solid #3a3520;
    padding: 2px 6px;
    margin: 2px 2px 0 0;
    font-size: 9px;
    color: #c8a03a;
  }

  .route-stats .no-keys {
    font-size: 10px;
    color: #3a3520;
    font-style: italic;
  }

  .route-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .route-list::-webkit-scrollbar { width: 4px; }
  .route-list::-webkit-scrollbar-track { background: #0a0a08; }
  .route-list::-webkit-scrollbar-thumb { background: #3a3520; }

  .route-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-bottom: 1px solid #1a1a14;
    transition: background 0.15s;
  }

  .route-item:hover { background: #1a1a14; }

  .route-item .num {
    background: #8a9a3a;
    color: #0a0a0a;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: bold;
    font-family: 'Oswald', sans-serif;
    flex-shrink: 0;
  }

  .route-item .ri-info { flex: 1; min-width: 0; }
  .route-item .name { font-size: 12px; color: #c8b87a; }

  .route-item .ri-meta {
    font-size: 9px;
    margin-top: 2px;
    color: #5a5535;
  }

  .route-item .ri-meta .ri-danger { margin-right: 8px; }

  .route-item .remove {
    background: none;
    border: none;
    color: #5a2a20;
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    line-height: 1;
    font-family: 'Share Tech Mono', monospace;
  }

  .route-item .remove:hover { color: #c84a3a; }

  .empty-state {
    padding: 24px 16px;
    text-align: center;
    color: #3a3520;
    font-size: 12px;
    line-height: 1.8;
  }

  .scanline {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px
    );
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>

<div class="scanline"></div>

<header>
  <h1>Tarkov <span>Loot Route</span> Planner</h1>
  <div class="controls">
    <label for="map-select">Map:</label>
    <select id="map-select"></select>
    <button id="clear-btn">Clear Route</button>
    <button id="edit-btn" class="btn-edit">Edit Nodes</button>
    <div class="edit-controls" id="edit-controls">
      <button id="reset-btn" class="btn-reset">Reset</button>
      <button id="save-btn" class="btn-save">Save &amp; Done</button>
    </div>
  </div>
</header>

<div class="main">
  <div class="map-area">
    <div class="map-container no-image" id="map-container" data-map-name="">
      <img class="map-bg" id="map-bg" src="" alt="" />
      <svg class="route-lines" id="route-lines">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
            <polygon points="0 0, 10 3.5, 0 7" class="arrow-head"/>
          </marker>
        </defs>
      </svg>
      <div class="compass">N</div>
    </div>
    <div class="tooltip-hud" id="tooltip-hud">
      <div class="tt-name"></div>
      <div class="tt-row"><span class="tt-label">Danger</span><span class="tt-value tt-danger"></span></div>
      <div class="tt-row"><span class="tt-label">Loot Tier</span><span class="tt-value tt-loot"></span></div>
      <div class="tt-keys"></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      Route <span class="count" id="route-count">0</span>
    </div>
    <div class="route-stats" id="route-stats">
      <div class="stat-row">
        <span class="stat-label">Overall Danger</span>
        <span class="stat-value" id="stat-danger">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Avg Loot Tier</span>
        <span class="stat-value" id="stat-loot">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Stops</span>
        <span class="stat-value" id="stat-stops">0</span>
      </div>
      <div class="keys-needed">
        <span class="stat-label">Keys Needed</span>
        <div id="stat-keys"></div>
      </div>
    </div>
    <div class="route-list" id="route-list">
      <div class="empty-state">Click locations on the map<br>to build your loot route</div>
    </div>
  </div>
</div>

<script>
// ─── Default coordinates (used for reset) ───
const DEFAULT_ZONES = {
  customs: [
    // West — Big Red & Trailer Park
    { name: "Big Red",         x: 8,  y: 40, dangerLevel: "Medium", lootTier: "A", keysRequired: ["Tarcone Director's Office Key"] },
    { name: "Trailer Park",    x: 6,  y: 50, dangerLevel: "Low",    lootTier: "B", keysRequired: ["Trailer Park Portable Cabin Key"] },
    { name: "Warehouse 4",     x: 5,  y: 28, dangerLevel: "Low",    lootTier: "C", keysRequired: [] },
    { name: "Crossroads",      x: 3,  y: 62, dangerLevel: "Low",    lootTier: "C", keysRequired: [] },
    // Mid-west
    { name: "Old Gas Station", x: 22, y: 45, dangerLevel: "High",   lootTier: "A", keysRequired: [] },
    { name: "Checkpoint",      x: 20, y: 65, dangerLevel: "Medium", lootTier: "B", keysRequired: [] },
    { name: "Factory Gate",    x: 15, y: 82, dangerLevel: "Low",    lootTier: "C", keysRequired: [] },
    // Center
    { name: "Crack House",     x: 38, y: 35, dangerLevel: "High",   lootTier: "A", keysRequired: ["Unknown Key", "Rala's Bunk House Key"] },
    { name: "Portable Bunkhouse", x: 42, y: 45, dangerLevel: "Medium", lootTier: "B", keysRequired: ["Portable Bunk House Key"] },
    { name: "Bus Depot",       x: 35, y: 55, dangerLevel: "Medium", lootTier: "B", keysRequired: [] },
    // Dorms
    { name: "Dorms",           x: 48, y: 25, dangerLevel: "High",   lootTier: "S", keysRequired: ["Marked Key (314)", "Room 114", "Room 206", "Room 203", "Room 303", "Room 110", "Room 105", "Guard Desk"] },
    { name: "Reshala Spawn",   x: 45, y: 42, dangerLevel: "High",   lootTier: "S", keysRequired: [] },
    // East-center
    { name: "New Gas",         x: 58, y: 48, dangerLevel: "High",   lootTier: "A", keysRequired: ["Gas Station Office Key", "Gas Station Storage Room Key"] },
    { name: "Fortress",        x: 55, y: 62, dangerLevel: "High",   lootTier: "A", keysRequired: ["Factory Emergency Exit Key"] },
    // East
    { name: "Military CP",     x: 72, y: 30, dangerLevel: "Medium", lootTier: "B", keysRequired: ["Military Checkpoint Key"] },
    { name: "Land Bridge",     x: 75, y: 50, dangerLevel: "Medium", lootTier: "C", keysRequired: [] },
    { name: "Sniper Tower",    x: 82, y: 22, dangerLevel: "Low",    lootTier: "C", keysRequired: [] },
    // Extracts
    { name: "RUAF Gate",       x: 50, y: 85, dangerLevel: "Low",    lootTier: "C", keysRequired: [] },
    { name: "ZB-1011",         x: 68, y: 78, dangerLevel: "Low",    lootTier: "C", keysRequired: [] },
    { name: "ZB-1012",         x: 92, y: 55, dangerLevel: "Low",    lootTier: "C", keysRequired: [] }
  ],
  ground_zero: [
    { name: "Terragroup HQ",   x: 35, y: 12, dangerLevel: "High",   lootTier: "S", keysRequired: ["TG Lab Key"] },
    { name: "Skyside",         x: 58, y: 10, dangerLevel: "Medium", lootTier: "A", keysRequired: [] },
    { name: "North Extract",   x: 88, y: 6,  dangerLevel: "Low",    lootTier: "C", keysRequired: [] },
    { name: "Empire",          x: 20, y: 32, dangerLevel: "High",   lootTier: "A", keysRequired: ["Empire Key"] },
    { name: "Capital Insight", x: 45, y: 35, dangerLevel: "High",   lootTier: "S", keysRequired: ["CI Office Key"] },
    { name: "Nakatani",        x: 70, y: 30, dangerLevel: "Medium", lootTier: "A", keysRequired: [] },
    { name: "Main Square",     x: 32, y: 50, dangerLevel: "High",   lootTier: "A", keysRequired: [] },
    { name: "Courtyard",       x: 50, y: 55, dangerLevel: "High",   lootTier: "B", keysRequired: [] },
    { name: "Clinic",          x: 75, y: 50, dangerLevel: "Medium", lootTier: "A", keysRequired: ["Clinic Key"] },
    { name: "Mira Prospect",   x: 28, y: 72, dangerLevel: "Medium", lootTier: "A", keysRequired: [] },
    { name: "Warehouse",       x: 52, y: 75, dangerLevel: "Medium", lootTier: "B", keysRequired: [] },
    { name: "Residential",     x: 72, y: 72, dangerLevel: "Low",    lootTier: "B", keysRequired: [] },
    { name: "South Gate",      x: 12, y: 90, dangerLevel: "Low",    lootTier: "C", keysRequired: [] },
    { name: "East Extract",    x: 92, y: 85, dangerLevel: "Low",    lootTier: "C", keysRequired: [] }
  ]
};

// Deep clone defaults into working MAPS
function cloneZones(arr) {
  return arr.map(z => ({ ...z, keysRequired: [...z.keysRequired] }));
}

const MAPS = {
  customs: {
    name: "Customs",
    image: "./customs.png",
    zones: cloneZones(DEFAULT_ZONES.customs)
  },
  ground_zero: {
    name: "Ground Zero",
    image: "./ground-zero.png",
    zones: cloneZones(DEFAULT_ZONES.ground_zero)
  }
};

let currentMap = 'customs';
let route = [];
let editMode = false;

// Drag state
let dragZone = null;
let dragEl = null;

const mapSelect = document.getElementById('map-select');
const mapContainer = document.getElementById('map-container');
const mapBg = document.getElementById('map-bg');
const routeList = document.getElementById('route-list');
const routeCount = document.getElementById('route-count');
const clearBtn = document.getElementById('clear-btn');
const editBtn = document.getElementById('edit-btn');
const editControls = document.getElementById('edit-controls');
const resetBtn = document.getElementById('reset-btn');
const saveBtn = document.getElementById('save-btn');
const routeLinesSvg = document.getElementById('route-lines');
const tooltipHud = document.getElementById('tooltip-hud');
const routeStatsEl = document.getElementById('route-stats');

// Populate select
Object.entries(MAPS).forEach(([key, map]) => {
  const opt = document.createElement('option');
  opt.value = key;
  opt.textContent = map.name;
  mapSelect.appendChild(opt);
});

mapSelect.addEventListener('change', () => {
  currentMap = mapSelect.value;
  route = [];
  renderMap();
  renderSidebar();
});

clearBtn.addEventListener('click', () => {
  route = [];
  renderMap();
  renderSidebar();
});

// ─── Edit Mode Controls ───
editBtn.addEventListener('click', () => {
  editMode = !editMode;
  editBtn.classList.toggle('active', editMode);
  editControls.classList.toggle('active', editMode);
  mapContainer.classList.toggle('edit-mode', editMode);
  editBtn.textContent = editMode ? 'Editing...' : 'Edit Nodes';
  renderMap();
});

resetBtn.addEventListener('click', () => {
  MAPS[currentMap].zones = cloneZones(DEFAULT_ZONES[currentMap]);
  renderMap();
  console.log('%c[RESET] Coordinates reset to defaults for ' + MAPS[currentMap].name, 'color: #c8a03a; font-weight: bold;');
});

saveBtn.addEventListener('click', () => {
  editMode = false;
  editBtn.classList.remove('active');
  editControls.classList.remove('active');
  mapContainer.classList.remove('edit-mode');
  editBtn.textContent = 'Edit Nodes';
  renderMap();

  // Print the calibrated zones array to console
  const zones = MAPS[currentMap].zones;
  const lines = zones.map(z => {
    const keys = z.keysRequired.length > 0
      ? '[' + z.keysRequired.map(k => '"' + k + '"').join(', ') + ']'
      : '[]';
    return '  { name: "' + z.name + '", x: ' + z.x + ', y: ' + z.y +
      ', dangerLevel: "' + z.dangerLevel + '", lootTier: "' + z.lootTier +
      '", keysRequired: ' + keys + ' }';
  });
  const output = '[\n' + lines.join(',\n') + '\n]';
  console.log('%c[SAVED] Calibrated zones for ' + MAPS[currentMap].name + ':\n', 'color: #5ac85a; font-weight: bold; font-size: 14px;');
  console.log(output);
});

function getZoneData(zoneName) {
  return MAPS[currentMap].zones.find(z => z.name === zoneName);
}

function renderMap() {
  const map = MAPS[currentMap];
  mapContainer.setAttribute('data-map-name', editMode ? '' : '// ' + map.name);

  // Set background image
  mapBg.src = map.image;
  mapBg.alt = map.name + ' map';
  mapBg.onerror = () => { mapContainer.classList.add('no-image'); };
  mapBg.onload = () => { mapContainer.classList.remove('no-image'); };

  // Remove old zones
  mapContainer.querySelectorAll('.zone').forEach(el => el.remove());

  map.zones.forEach((zone) => {
    const el = document.createElement('div');
    el.className = 'zone';
    el.setAttribute('data-danger', zone.dangerLevel);
    el.setAttribute('data-name', zone.name);
    el.style.left = zone.x + '%';
    el.style.top = zone.y + '%';

    if (!editMode) {
      const routeIdx = route.indexOf(zone.name);
      if (routeIdx !== -1) {
        el.classList.add('in-route');
        const num = document.createElement('div');
        num.className = 'route-number';
        num.textContent = routeIdx + 1;
        el.appendChild(num);
      }
    }

    const dot = document.createElement('div');
    dot.className = 'zone-dot';
    el.appendChild(dot);

    const lbl = document.createElement('div');
    lbl.className = 'zone-label';
    lbl.textContent = zone.name;
    el.appendChild(lbl);

    if (editMode) {
      // Drag and drop in edit mode
      el.addEventListener('mousedown', (e) => {
        e.preventDefault();
        dragZone = zone;
        dragEl = el;
        el.classList.add('dragging');
      });
    } else {
      // Normal route mode
      el.addEventListener('click', () => toggleZone(zone.name));
    }

    el.addEventListener('mouseenter', (e) => showTooltip(e, zone));
    el.addEventListener('mousemove', (e) => { if (!dragZone) moveTooltip(e); });
    el.addEventListener('mouseleave', hideTooltip);

    mapContainer.appendChild(el);
  });

  drawRouteLines();
}

// ─── Global drag handlers ───
document.addEventListener('mousemove', (e) => {
  if (!dragZone || !dragEl) return;

  const rect = mapContainer.getBoundingClientRect();
  let xPct = ((e.clientX - rect.left) / rect.width) * 100;
  let yPct = ((e.clientY - rect.top) / rect.height) * 100;

  // Clamp to container bounds
  xPct = Math.max(1, Math.min(99, xPct));
  yPct = Math.max(1, Math.min(99, yPct));

  // Round to 1 decimal
  xPct = Math.round(xPct * 10) / 10;
  yPct = Math.round(yPct * 10) / 10;

  // Update data
  dragZone.x = xPct;
  dragZone.y = yPct;

  // Update element position
  dragEl.style.left = xPct + '%';
  dragEl.style.top = yPct + '%';

  // Update route lines live
  drawRouteLines();
});

document.addEventListener('mouseup', () => {
  if (dragEl) {
    dragEl.classList.remove('dragging');
    console.log(
      '%c[MOVED] ' + dragZone.name + ' → x: ' + dragZone.x + ', y: ' + dragZone.y,
      'color: #6ac8e8; font-weight: bold;'
    );
  }
  dragZone = null;
  dragEl = null;
});

function toggleZone(zoneName) {
  if (editMode) return;
  const idx = route.indexOf(zoneName);
  if (idx !== -1) {
    route.splice(idx, 1);
  } else {
    route.push(zoneName);
  }
  renderMap();
  renderSidebar();
}

function showTooltip(e, zone) {
  if (dragZone) return;
  tooltipHud.style.display = 'block';
  tooltipHud.setAttribute('data-danger', zone.dangerLevel);
  tooltipHud.querySelector('.tt-name').textContent = zone.name;

  const dangerEl = tooltipHud.querySelector('.tt-danger');
  dangerEl.textContent = zone.dangerLevel;
  dangerEl.className = 'tt-value tt-danger danger-' + zone.dangerLevel.toLowerCase();

  const lootEl = tooltipHud.querySelector('.tt-loot');
  lootEl.textContent = 'Tier ' + zone.lootTier;
  lootEl.className = 'tt-value tt-loot loot-' + zone.lootTier.toLowerCase();

  const keysEl = tooltipHud.querySelector('.tt-keys');
  if (zone.keysRequired.length > 0) {
    keysEl.innerHTML = '<span class="tt-label" style="display:block;margin-bottom:4px;color:#6a6245">Keys Required</span>' +
      zone.keysRequired.map(k => '<span>' + k + '</span>').join('');
  } else {
    keysEl.innerHTML = '';
  }

  moveTooltip(e);
}

function moveTooltip(e) {
  const mapArea = document.querySelector('.map-area');
  const rect = mapArea.getBoundingClientRect();
  let x = e.clientX - rect.left + 16;
  let y = e.clientY - rect.top - 10;

  const tw = tooltipHud.offsetWidth;
  const th = tooltipHud.offsetHeight;
  if (x + tw > rect.width - 10) x = e.clientX - rect.left - tw - 16;
  if (y + th > rect.height - 10) y = rect.height - th - 10;
  if (y < 10) y = 10;

  tooltipHud.style.left = x + 'px';
  tooltipHud.style.top = y + 'px';
}

function hideTooltip() {
  tooltipHud.style.display = 'none';
}

function renderSidebar() {
  routeCount.textContent = route.length;

  if (route.length > 0) {
    routeStatsEl.classList.add('active');
    updateRouteStats();
  } else {
    routeStatsEl.classList.remove('active');
  }

  if (route.length === 0) {
    routeList.innerHTML = '<div class="empty-state">Click locations on the map<br>to build your loot route</div>';
    return;
  }

  routeList.innerHTML = '';
  route.forEach((zoneName, i) => {
    const zone = getZoneData(zoneName);
    const item = document.createElement('div');
    item.className = 'route-item';

    const dangerColor = zone.dangerLevel === 'High' ? '#c84a3a' : zone.dangerLevel === 'Medium' ? '#c8a03a' : '#4a8a3a';
    const lootColor = zone.lootTier === 'S' ? '#e8c84a' : zone.lootTier === 'A' ? '#c8b87a' : zone.lootTier === 'B' ? '#8a8a6a' : '#5a5a4a';

    item.innerHTML = `
      <div class="num">${i + 1}</div>
      <div class="ri-info">
        <div class="name">${zone.name}</div>
        <div class="ri-meta">
          <span class="ri-danger" style="color:${dangerColor}">${zone.dangerLevel}</span>
          <span style="color:${lootColor}">Tier ${zone.lootTier}</span>
        </div>
      </div>
      <button class="remove" title="Remove">&times;</button>
    `;
    item.querySelector('.remove').addEventListener('click', () => {
      route.splice(i, 1);
      renderMap();
      renderSidebar();
    });
    routeList.appendChild(item);
  });
}

function updateRouteStats() {
  const zones = route.map(n => getZoneData(n)).filter(Boolean);

  const dangerOrder = { 'High': 3, 'Medium': 2, 'Low': 1 };
  const dangerLabels = { 3: 'High', 2: 'Medium', 1: 'Low' };
  const maxDanger = Math.max(...zones.map(z => dangerOrder[z.dangerLevel]));
  const overallDanger = dangerLabels[maxDanger];

  const dangerEl = document.getElementById('stat-danger');
  dangerEl.textContent = overallDanger;
  dangerEl.style.color = overallDanger === 'High' ? '#c84a3a' : overallDanger === 'Medium' ? '#c8a03a' : '#4a8a3a';

  const lootValues = { 'S': 4, 'A': 3, 'B': 2, 'C': 1 };
  const lootLabels = { 4: 'S', 3: 'A', 2: 'B', 1: 'C' };
  const avgLoot = zones.reduce((s, z) => s + lootValues[z.lootTier], 0) / zones.length;
  const avgLootTier = lootLabels[Math.round(avgLoot)];

  const lootEl = document.getElementById('stat-loot');
  lootEl.textContent = 'Tier ' + avgLootTier;
  lootEl.style.color = avgLootTier === 'S' ? '#e8c84a' : avgLootTier === 'A' ? '#c8b87a' : avgLootTier === 'B' ? '#8a8a6a' : '#5a5a4a';

  document.getElementById('stat-stops').textContent = zones.length;

  const allKeys = [...new Set(zones.flatMap(z => z.keysRequired))];
  const keysDiv = document.getElementById('stat-keys');
  if (allKeys.length > 0) {
    keysDiv.innerHTML = allKeys.map(k => '<span class="key-tag">' + k + '</span>').join('');
  } else {
    keysDiv.innerHTML = '<span class="no-keys">None required</span>';
  }
}

function drawRouteLines() {
  const defs = routeLinesSvg.querySelector('defs');
  routeLinesSvg.innerHTML = '';
  routeLinesSvg.appendChild(defs);

  if (route.length < 2) return;

  const w = mapContainer.clientWidth;
  const h = mapContainer.clientHeight;
  routeLinesSvg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);

  const map = MAPS[currentMap];
  const centers = [];
  route.forEach(zoneName => {
    const zone = map.zones.find(z => z.name === zoneName);
    if (!zone) return;
    centers.push({
      x: (zone.x / 100) * w,
      y: (zone.y / 100) * h
    });
  });

  for (let i = 0; i < centers.length - 1; i++) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', centers[i].x);
    line.setAttribute('y1', centers[i].y);
    line.setAttribute('x2', centers[i + 1].x);
    line.setAttribute('y2', centers[i + 1].y);
    line.setAttribute('marker-end', 'url(#arrowhead)');
    routeLinesSvg.appendChild(line);
  }
}

window.addEventListener('resize', drawRouteLines);

renderMap();
renderSidebar();
</script>

</body>
</html>
